# Baby Bassinet State Detection Pipeline - Configuration
# All thresholds are config-driven; tune per camera/environment.

# --- RTSP Capture ---
capture:
  rtsp_url: "${RTSP_URL}"          # env-substituted at runtime
  frame_width: 1920
  frame_height: 1080
  capture_timeout_sec: 10
  night_vision:
    enabled: true
    # CLAHE parameters for night-vision frame enhancement
    clahe_clip_limit: 3.0
    clahe_grid_size: 8

# --- Stage 1: Baby Detector (YOLOv8n) ---
baby_detector:
  model_path: "models/baby_detector.pt"
  base_model: "yolov8n.pt"          # pretrained checkpoint for fine-tuning
  input_size: 640
  confidence_threshold: 0.35
  iou_threshold: 0.45
  # Only accept detections of these COCO classes (0=person)
  # After fine-tuning, class 0 = baby
  target_classes: [0]
  # Minimum fraction of frame area for a valid baby box
  min_box_area_ratio: 0.01
  # Maximum fraction (reject huge false positives)
  max_box_area_ratio: 0.80
  # Pad baby crop by this fraction before passing to face detector
  crop_pad_fraction: 0.15

# --- Stage 2: Face/Head Detector (YOLOv8n) ---
face_detector:
  model_path: "models/face_detector.pt"
  base_model: "yolov8n.pt"
  input_size: 640
  confidence_threshold: 0.30
  iou_threshold: 0.45
  target_classes: [0]               # class 0 = face after fine-tuning
  # Minimum face box area relative to baby crop
  min_box_area_ratio: 0.005
  # Pad face crop before eye classifier
  crop_pad_fraction: 0.10

# --- Stage 3: Eye-State Classifier (MobileNetV3-Small) ---
eye_classifier:
  model_path: "models/eye_classifier.pt"
  input_size: 224
  num_classes: 2                     # eyes_open, eyes_closed
  class_names: ["eyes_open", "eyes_closed"]
  # Confidence below this → eyes_unclear regardless of prediction
  confidence_threshold: 0.65
  # Class weights for training (penalize awake→asleep errors)
  # Higher weight on eyes_open = model is more cautious about missing open eyes
  train_class_weights: [2.0, 1.0]
  # Augmentation
  augmentation:
    horizontal_flip: true
    rotation_degrees: 15
    color_jitter:
      brightness: 0.3
      contrast: 0.3
      saturation: 0.2
      hue: 0.05
    # Simulate night vision by converting to grayscale with probability
    grayscale_prob: 0.3

# --- Motion Scoring (OpenCV) ---
motion:
  # Number of consecutive frames to compare
  history_frames: 2
  # Gaussian blur kernel size (must be odd)
  blur_kernel: 21
  # Threshold for binary motion mask
  diff_threshold: 25
  # Minimum contour area (pixels) to count as motion
  min_contour_area: 500
  # Motion score above this = significant movement
  high_motion_threshold: 0.05
  # Motion score below this = very still
  low_motion_threshold: 0.005
  # Region of interest: fraction of baby crop to analyze [x, y, w, h]
  # null = use entire baby crop
  roi_fraction: null

# --- Temporal Rule Engine ---
temporal:
  # Rolling window duration in seconds
  window_seconds: 15
  # Minimum observations in window to make a decision
  min_observations: 3

  # --- State transition rules ---
  # not_present: baby absent in >= this fraction of window
  not_present_threshold: 0.80

  # asleep: requires ALL of:
  #   - eyes_closed fraction >= threshold
  #   - eyes_open fraction < max_open (strict: minimize awake→asleep errors)
  #   - motion score below threshold
  asleep:
    min_eyes_closed_fraction: 0.60
    max_eyes_open_fraction: 0.0      # zero tolerance for open eyes → asleep
    max_motion_score: 0.01
    # If eyes_unclear dominates, require extra stillness
    unclear_motion_penalty: 0.5      # multiply motion threshold by this

  # awake: requires ANY of:
  #   - eyes_open fraction >= threshold
  #   - high motion even with unclear eyes
  awake:
    min_eyes_open_fraction: 0.40
    min_motion_for_unclear: 0.03     # motion alone can signal awake

  # Everything else → unknown
  # Including: face not visible, eyes mostly unclear with low motion,
  # mixed signals, insufficient observations

# --- Training ---
training:
  # Time-block split: split by contiguous time blocks, not random frames
  # Each block is N minutes of consecutive frames
  time_block_minutes: 30
  val_fraction: 0.20
  test_fraction: 0.10

  baby_detector:
    epochs: 100
    batch_size: 16
    learning_rate: 0.01
    patience: 15                     # early stopping patience
    image_size: 640
    augment: true

  face_detector:
    epochs: 100
    batch_size: 16
    learning_rate: 0.01
    patience: 15
    image_size: 640
    augment: true

  eye_classifier:
    epochs: 60
    batch_size: 32
    learning_rate: 0.001
    patience: 10
    weight_decay: 0.0001
    scheduler: "cosine"              # cosine | step | plateau
    scheduler_params:
      T_max: 60

# --- Inference ---
inference:
  # Interval between RTSP captures in seconds
  poll_interval_sec: 5
  # Device: cpu, cuda, mps
  device: "cpu"
  # Save annotated frames
  save_annotated: true
  annotated_dir: "output/annotated"
  # Output log
  output_log: "output/detections.jsonl"

# --- Evaluation ---
evaluation:
  # Ground truth labels file (JSONL: timestamp, state)
  ground_truth: "data/ground_truth.jsonl"
  output_dir: "output/eval"
  # Cost matrix for weighted evaluation (penalize awake→asleep errors)
  # Format: {true_label: {predicted_label: cost}}
  cost_matrix:
    awake:
      asleep: 10.0       # CRITICAL: missing a wake event
      unknown: 1.0
      not_present: 2.0
    asleep:
      awake: 1.0          # false alarm, annoying but not dangerous
      unknown: 0.5
      not_present: 2.0
    not_present:
      awake: 1.0
      asleep: 2.0
      unknown: 0.5
